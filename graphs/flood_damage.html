<html>
<head><meta charset="utf-8" /></head>
<body>
    <div>
        <script type="text/javascript">window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
        <script charset="utf-8" src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
        <div id="graph-div" class="plotly-graph-div" style="height:880px; width:100%;"></div>
        <script type="text/javascript">
            if (document.getElementById("graph-div")) {
                Plotly.newPlot("graph-div", 
                [
                    {
                        "type":"bar", "name":"10-ročná voda", "marker":{"color":"#FCA5A5"},
                        "x":["1111","1121","1122","1123","1210","1221","1241","2110","2430"],
                        "y":[0.73, 21.7, 112.2, 60.0, 209.2, 36.3, 25.8, 468.5, 287.8]
                    },
                    {
                        "type":"bar", "name":"100-ročná voda", "marker":{"color":"#EF4444"},
                        "x":["1111","1121","1122","1123","1210","1221","1241","2110","2430"],
                        "y":[9.2, 80.0, 291.0, 130.5, 514.2, 64.5, 32.2, 1020.0, 406.6]
                    },
                    {
                        "type":"bar", "name":"1000-ročná voda", "marker":{"color":"#7F1D1D"},
                        "x":["1111","1121","1122","1123","1210","1221","1241","2110","2430"],
                        "y":[29.6, 147.8, 526.8, 195.7, 972.6, 90.2, 36.9, 1411.5, 484.7]
                    }
                ],
                {
                    "title": {"text": "Povodňové škody (mil. €)", "x": 0.05},
                    "margin": {"t": 150, "l": 50, "r": 50, "b": 250},
                    "barmode": "group",
                    "legend": {"orientation": "h", "y": -0.2, "x": 0.5, "xanchor": "center"},
                    "updatemenus": [
                        {
                            "type": "dropdown",
                            "active": 0,
                            "x": 1.0, "y": 1.2,
                            "xanchor": "right",
                            "buttons": [
                                {"label": "Mierka: Lineárna", "method": "relayout", "args": [{"yaxis.type": "linear"}]},
                                {"label": "Mierka: Logaritmická", "method": "relayout", "args": [{"yaxis.type": "log"}]}
                            ]
                        },
                        {
                            "type": "dropdown",
                            "active": 0,
                            "x": 1.0, "y": 1.1,
                            "xanchor": "right",
                            "buttons": [
                                {"label": "Jazyk: SK", "method": "update", "args": [{"title.text": "Povodňové škody (SK)"}]},
                                {"label": "Language: EN", "method": "update", "args": [{"title.text": "Flood damages (EN)"}]}
                            ]
                        }
                    ]
                },
                {"responsive": true});
            }
        </script>
    </div>
    <style>
        html, body { background: transparent !important; margin: 0; padding: 0; overflow: hidden; }
        .main-svg { background: transparent !important; }
    </style>
</body>
</html>
